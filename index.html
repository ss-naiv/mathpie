<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>MathPie</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root{
  --bg:#FFF6EC; --card:#FFFFFF; --ink:#4A3F35; --ink-soft:#8A7A6A;
  --accent:#FF8A3D; --accent-deep:#E86F1F; --good:#57B368; --soft:#FFE9D2;
  --chip:#FFE1B8; --chip-border:#F5C079; --slot:#FFB876; --amber:#FFF3D6;
  --radius:22px; --shadow:0 4px 14px rgba(120,80,40,.10);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:ui-rounded,-apple-system,"SF Pro Rounded","Segoe UI",system-ui,sans-serif;
  font-size:18px;line-height:1.45; min-height:100%;}
#app{max-width:640px;margin:0 auto;padding:12px 16px 170px}
header{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 12px}
header .brand{font-weight:800;font-size:22px;color:var(--accent-deep)}
header .stats{display:flex;gap:10px;align-items:center}
.stat{background:var(--card);border-radius:999px;padding:6px 12px;font-weight:700;
  box-shadow:var(--shadow);font-size:15px}
.gear{background:none;border:none;font-size:22px;cursor:pointer;padding:4px}
section{display:none}
section.active{display:block}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:20px;margin-bottom:14px}
h2{margin:0 0 8px;font-size:20px}
p{margin:8px 0}
.muted{color:var(--ink-soft);font-size:15px}
.btn{display:block;width:100%;border:none;border-radius:18px;padding:16px 18px;margin:10px 0;
  font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;color:#fff;
  background:var(--accent);box-shadow:0 3px 0 var(--accent-deep);transition:transform .06s}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--accent-deep)}
.btn.soft{background:var(--soft);color:var(--ink);box-shadow:0 3px 0 #EED4B4}
.btn.good{background:var(--good);box-shadow:0 3px 0 #3E8F4E}
.btn.small{width:auto;display:inline-block;padding:10px 16px;font-size:15px;margin:6px 6px 0 0}
.btn:disabled{opacity:.45;cursor:default}
.opt{background:var(--card);color:var(--ink);border:2.5px solid var(--chip-border);
  box-shadow:none;text-align:left}
.opt.right{border-color:var(--good);background:#EAF7EC}
.opt.dim{opacity:.5}
.eq{font-size:24px;font-weight:800;text-align:center;padding:18px 8px;letter-spacing:.5px;
  background:var(--soft);border-radius:16px;margin:10px 0;overflow-x:auto;white-space:nowrap}
.eq.detour{background:var(--amber);border:2px dashed var(--slot)}
.goal{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:1px;
  color:var(--accent-deep);text-align:center}
.chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:12px 0}
.chip{border:none;font-family:inherit;cursor:pointer;background:var(--chip);
  border:2px solid var(--chip-border);border-radius:14px;padding:8px 14px;text-align:center;
  transition:transform .1s}
.chip .lbl{display:block;font-size:12px;color:var(--ink-soft);font-weight:700}
.chip .val{display:block;font-size:19px;font-weight:800}
.chip.used{opacity:.35;pointer-events:none}
.chip.view{pointer-events:none;padding:5px 10px}
.chip.view .val{font-size:16px}
.pinnedbar{padding:12px 16px;background:#FFFDF8;border:1.5px solid var(--soft)}
.chip.result{background:#EAF7EC;border-color:var(--good);animation:pop .35s}
.tmpl{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;margin:16px 0;min-height:56px}
.slot{display:inline-flex;align-items:center;justify-content:center;min-width:76px;height:52px;
  border:2.5px dashed var(--slot);border-radius:14px;background:#FFFBF4;font-size:18px;padding:0 8px}
.slot.filled{border-style:solid;background:var(--chip);animation:pop .3s}
@keyframes pop{0%{transform:scale(.6)}70%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes wiggle{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.wiggle{animation:wiggle .35s}
.mascot{position:fixed;left:0;right:0;bottom:0;pointer-events:none;z-index:50}
.mascot-inner{max-width:640px;margin:0 auto;padding:0 12px 10px;display:flex;align-items:flex-end;gap:10px}
.bubble{pointer-events:auto;background:var(--card);border-radius:18px;box-shadow:var(--shadow);
  padding:12px 16px;font-size:16px;flex:1;min-height:24px;border:2px solid var(--soft);
  max-height:150px;overflow-y:auto}
.bubble b{color:var(--accent-deep)}
#paiSvg{width:86px;height:86px;flex-shrink:0;pointer-events:auto}
.hat{font-size:26px;position:absolute;transform:translate(28px,-6px)}
.prove-line{background:var(--soft);border-radius:12px;padding:10px 14px;margin:8px 0;
  font-weight:700;animation:pop .3s}
.whyline{background:#F3F8EE;border-left:4px solid var(--good);border-radius:10px;
  padding:10px 12px;font-size:15px;margin:10px 0}
.bignum{font-size:46px;font-weight:800;text-align:center;letter-spacing:2px;
  padding:18px 8px;background:var(--soft);border-radius:16px;margin:12px 0;
  font-variant-numeric:tabular-nums;overflow-x:auto}
.bignum.pop{animation:pop .25s}
.elevbtns{display:flex;gap:12px;justify-content:center;margin:10px 0}
.elevbtns .btn{width:auto;flex:1;max-width:170px;font-size:22px}
.trickcard{border:2px solid var(--chip-border);border-radius:16px;padding:14px 16px;margin:12px 0}
.trickcard.locked{opacity:.55;border-style:dashed}
.trickcard h3{margin:0 0 6px;font-size:18px}
.trickcard .why{background:#F3F8EE;border-radius:10px;padding:8px 12px;font-size:14px;margin:8px 0}
.costume-row{display:flex;justify-content:space-between;gap:14px;background:var(--soft);
  border-radius:10px;padding:7px 12px;margin:5px 0;font-size:15px;min-width:170px}
.costume-row b{font-variant-numeric:tabular-nums}
.ticket{background:linear-gradient(135deg,#FFE9A8,#FFD07A);border:2px dashed #C99B3F;
  border-radius:16px;padding:16px;text-align:center;font-weight:800;font-size:19px;
  margin:12px 0;animation:pop .5s}
.skilltile{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:18px;
  box-shadow:var(--shadow);padding:14px 16px;margin:10px 0;border:none;width:100%;
  font-family:inherit;font-size:17px;font-weight:700;color:var(--ink);cursor:pointer;text-align:left}
.skilltile .emoji{font-size:28px}
.skilltile.locked{opacity:.5}
.skilltile .sub{display:block;font-size:13px;color:var(--ink-soft);font-weight:600}
.confetti{position:fixed;top:-12px;font-size:20px;z-index:99;animation:fall 1.8s ease-in forwards;pointer-events:none}
@keyframes fall{to{transform:translateY(105vh) rotate(360deg);opacity:.7}}
.modal{position:fixed;inset:0;background:rgba(60,40,20,.45);display:none;z-index:100;
  align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.modal .card{max-width:480px;width:100%;margin:0;max-height:85vh;overflow-y:auto}
input[type=url],input[type=text]{width:100%;padding:12px;border-radius:12px;border:2px solid var(--chip-border);
  font-size:16px;font-family:inherit}
.progress{height:8px;background:var(--soft);border-radius:99px;margin:6px 0 14px;overflow:hidden}
.progress i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .3s}
.coupon-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--soft);border-radius:14px;padding:12px 14px;margin:8px 0;font-weight:700}
.coupon-row.redeemed{opacity:.45;text-decoration:line-through}
.center{text-align:center}
.bigx{font-size:44px;font-weight:800;text-align:center;color:var(--accent-deep);margin:8px 0}
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="brand">🥧 MathPie</span>
    <span class="stats">
      <span class="stat" id="statStreak">🔥 0</span>
      <span class="stat" id="statXp">⭐ 0</span>
      <button class="gear" id="gearBtn" aria-label="Settings">⚙️</button>
    </span>
  </header>

  <section id="scr-home" class="active"></section>
  <section id="scr-warmup"></section>
  <section id="scr-quest"></section>
  <section id="scr-gym"></section>
  <section id="scr-wrap"></section>
  <section id="scr-shelf"></section>
  <section id="scr-elevator"></section>
  <section id="scr-tricks"></section>
  <section id="scr-progress"></section>
  <section id="scr-closet"></section>
</div>

<div class="mascot"><div class="mascot-inner">
  <div style="position:relative">
    <span class="hat" id="paiHat"></span>
    <svg id="paiSvg" viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="54" r="36" fill="#FFB74D"/>
      <path d="M22 34 L14 16 L34 24 Z" fill="#FFB74D"/><path d="M78 34 L86 16 L66 24 Z" fill="#FFB74D"/>
      <path d="M22 34 L17 22 L30 27 Z" fill="#FFE1B8"/><path d="M78 34 L83 22 L70 27 Z" fill="#FFE1B8"/>
      <path d="M36 22 q4 8 1 12" stroke="#E86F1F" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M50 19 q0 8 0 12" stroke="#E86F1F" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M64 22 q-4 8 -1 12" stroke="#E86F1F" stroke-width="4" fill="none" stroke-linecap="round"/>
      <ellipse cx="50" cy="66" rx="16" ry="12" fill="#FFF3E0"/>
      <g id="paiEyes">
        <circle cx="37" cy="50" r="4.5" fill="#4A3F35"/>
        <circle cx="63" cy="50" r="4.5" fill="#4A3F35"/>
      </g>
      <g id="paiEyesHappy" style="display:none">
        <path d="M32 51 q5 -7 10 0" stroke="#4A3F35" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M58 51 q5 -7 10 0" stroke="#4A3F35" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      </g>
      <path id="paiMouth" d="M44 64 q6 6 12 0" stroke="#4A3F35" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="50" cy="60" rx="4" ry="3" fill="#E86F1F"/>
      <circle cx="28" cy="60" r="4" fill="#FFCDD2" opacity=".8"/>
      <circle cx="72" cy="60" r="4" fill="#FFCDD2" opacity=".8"/>
    </svg>
  </div>
  <div class="bubble" id="bubble" aria-live="polite">…</div>
</div></div>

<div class="modal" id="settingsModal">
  <div class="card">
    <h2>Settings</h2>
    <p class="muted">Tutor server URL (optional — leave blank for offline-only)</p>
    <input type="url" id="tutorUrlInput" placeholder="https://your-tutor.example.com">
    <button class="btn small soft" id="testTutorBtn">Test connection</button>
    <span id="tutorTestResult" class="muted"></span>
    <h2 style="margin-top:18px">🎟️ Coupon list</h2>
    <p class="muted">These are the rewards that can drop after sessions. Edit away — make them yours!</p>
    <div id="couponEditor"></div>
    <input type="text" id="newCouponInput" placeholder="New coupon, e.g. Boba run 🧋" maxlength="60">
    <button class="btn small soft" id="addCouponBtn">＋ Add coupon</button>
    <button class="btn" id="saveSettingsBtn">Save &amp; close</button>
    <button class="btn small soft" id="resetBtn">Reset all progress…</button>
    <button class="btn small soft" id="closeSettingsBtn">Close</button>
  </div>
</div>

<script>
'use strict';
/* ---------------- state ---------------- */
const KEY = 'mathpie-v1';
const SRS_INTERVALS = [1, 3, 7, 16, 35];
let C = {};          // loaded content
let S = loadState(); // persistent state

function defaults(){ return {
  xp:0, streak:0, lastDay:null, doneToday:{}, doneDay:null,
  srs:{}, usedProblems:[], usedEquations:[],
  coupons:[], cosmetics:[], activeCosmetic:null, milestonesClaimed:{},
  stats:{warmups:0, quests:0, gyms:0, elevators:0},
  couponPool:null, lastShareNudge:null, tricksTried:{},
  settings:{tutorUrl:''}
};}
function loadState(){
  try{ const s = JSON.parse(localStorage.getItem(KEY)); return s ? Object.assign(defaults(), s) : defaults(); }
  catch(e){ return defaults(); }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }
function todayStr(d){ d = d || new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function yesterdayStr(){ return todayStr(new Date(Date.now() - 864e5)); }
function resetDayFlags(){
  if (S.doneDay !== todayStr()){ S.doneDay = todayStr(); S.doneToday = {}; save(); }
}

/* ---------------- utils ---------------- */
const $ = id => document.getElementById(id);
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(a){ a = a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function fmt(v,u){ if(u==='$') return '$'+v; if(u==='%') return v+'%'; if(u==='¢') return v+'¢'; return u ? v+' '+u : String(v); }
function esc(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function say(text, mood){
  $('bubble').innerHTML = '<b>'+esc(C.enc.mascotName)+':</b> '+esc(text);
  const happy = mood === 'happy';
  $('paiEyes').style.display = happy ? 'none' : '';
  $('paiEyesHappy').style.display = happy ? '' : 'none';
  $('paiMouth').setAttribute('d', happy ? 'M42 63 q8 9 16 0' : 'M44 64 q6 6 12 0');
}
function confetti(){
  const chars = ['🎉','⭐','🥧','✨','🧡'];
  for(let i=0;i<34;i++){
    const s = document.createElement('span');
    s.className='confetti'; s.textContent = pick(chars);
    s.style.left = Math.random()*100+'vw';
    s.style.animationDelay = (Math.random()*0.5)+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 2600);
  }
}
function addXp(n){ S.xp += n; save(); renderHeader(); }
function renderHeader(){ $('statStreak').textContent = '🔥 '+S.streak; $('statXp').textContent = '⭐ '+S.xp; }
function show(id){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo(0,0);
}
function bumpStreak(){
  const t = todayStr();
  if (S.lastDay === t) return;
  S.streak = (S.lastDay === yesterdayStr()) ? S.streak + 1 : 1;
  S.lastDay = t; save(); renderHeader();
}

/* ---------------- home ---------------- */
let sessionMode = false;
function renderHome(){
  resetDayFlags();
  const done = S.doneToday;
  const allDone = done.warmup && done.quest && done.gym;
  let html = '<div class="card center">';
  html += allDone
    ? '<h2>All done for today! 🎉</h2><p class="muted">Streak is safe. Anything below is bonus.</p>'
    : '<h2>Today\'s session</h2><p class="muted">Warm-up → one quest → one gym round. About 10 minutes.</p>';
  html += '<div class="progress"><i style="width:'+ (((done.warmup?1:0)+(done.quest?1:0)+(done.gym?1:0))/3*100) +'%"></i></div>';
  html += '<button class="btn" id="startSessionBtn">'+(allDone?'Bonus round 🌟':'Start today\'s session ☀️')+'</button></div>';

  html += '<h2 style="margin:18px 4px 6px">Free play</h2>';
  for(const sk of C.skills){
    if (sk.id==='warmup')
      html += '<button class="skilltile" data-go="warmup"><span class="emoji">'+sk.emoji+'</span><span>'+esc(sk.name)+(done.warmup?' ✓':'')+'<span class="sub">'+esc(sk.sub||'')+'</span></span></button>';
    else if (sk.id==='move-gym')
      html += '<button class="skilltile" data-go="gym"><span class="emoji">'+sk.emoji+'</span><span>'+esc(sk.name)+(done.gym?' ✓':'')+'<span class="sub">'+esc(sk.sub||'')+'</span></span></button>';
    else if (sk.id==='fraction-costumes' && sk.unlocked)
      html += '<button class="skilltile" data-go="closet"><span class="emoji">'+sk.emoji+'</span><span>'+esc(sk.name)+(done.closet?' ✓':'')+'<span class="sub">'+esc(sk.sub||'')+'</span></span></button>';
    else if (sk.id==='decimal-elevator' && sk.unlocked)
      html += '<button class="skilltile" data-go="elevator"><span class="emoji">'+sk.emoji+'</span><span>'+esc(sk.name)+(done.elevator?' ✓':'')+'<span class="sub">'+esc(sk.sub||'')+'</span></span></button>';
    else if (sk.id==='trick-book' && sk.unlocked)
      html += '<button class="skilltile" data-go="tricks"><span class="emoji">'+sk.emoji+'</span><span>'+esc(sk.name)+'<span class="sub">'+esc(sk.sub||'')+'</span></span></button>';
    else if (sk.unlocked && sk.questSkills)
      html += '<button class="skilltile" data-go="quest" data-skillgroup="'+esc(sk.id)+'"><span class="emoji">'+sk.emoji+'</span><span>'+esc(sk.name)+(done.quest?' ✓':'')+'<span class="sub">'+esc(sk.sub||'')+'</span></span></button>';
    else
      html += '<button class="skilltile locked"><span class="emoji">'+sk.emoji+'</span><span>'+esc(sk.name)+'<span class="sub">Coming soon</span></span></button>';
  }
  html += '<button class="skilltile" data-go="shelf"><span class="emoji">🎁</span><span>Reward Shelf<span class="sub">Coupons &amp; looks for '+esc(C.enc.mascotName)+'</span></span></button>';
  html += '<button class="skilltile" data-go="progress"><span class="emoji">📈</span><span>My Progress<span class="sub">Streak, strong facts &amp; share with Dad</span></span></button>';
  $('scr-home').innerHTML = html;

  $('startSessionBtn').onclick = ()=>{ sessionMode = true; startWarmup(); };
  document.querySelectorAll('[data-go]').forEach(b=>{
    b.onclick = ()=>{ sessionMode = false;
      const go = b.getAttribute('data-go');
      if (go==='warmup') startWarmup();
      else if (go==='quest'){
        const grp = C.skills.find(s=>s.id===b.getAttribute('data-skillgroup'));
        startQuest(grp ? grp.questSkills : null);
      }
      else if (go==='gym') startGym();
      else if (go==='elevator') startElevator();
      else if (go==='closet') startCloset();
      else if (go==='tricks') renderTricks();
      else if (go==='shelf') renderShelf();
      else if (go==='progress') renderProgress();
    };
  });
  show('scr-home');
  say(pick(C.enc.welcome));
}

/* ---------------- warm-up (SRS + ballpark) ---------------- */
let WU = null;
function srsDueFacts(){
  const t = todayStr();
  const withMeta = C.facts.facts.map(f=>{
    const st = S.srs[f.id];
    return {f, isNew: !st, due: st ? st.due <= t : true, box: st ? st.box : -1};
  });
  const due = withMeta.filter(x=>x.due);
  const pool = due.length >= 3 ? due : withMeta;
  pool.sort((a,b)=>a.box-b.box);
  return shuffle(pool.slice(0,6)).slice(0,3).map(x=>x.f);
}
function startWarmup(){
  WU = { cards: srsDueFacts().map(f=>({type:'fact',f})), i:0 };
  WU.cards.push({type:'ballpark', b: pick(C.facts.ballparks)});
  renderWarmupCard();
  show('scr-warmup');
}
function renderWarmupCard(){
  const c = WU.cards[WU.i];
  const n = WU.cards.length;
  let html = '<div class="card"><p class="muted">Warm-up · '+(WU.i+1)+' of '+n+'</p>';
  const q = c.type==='fact' ? c.f.front : c.b.prompt;
  const opts = c.type==='fact' ? c.f.choices : c.b.options;
  html += '<h2>'+esc(q)+'</h2>';
  for(const o of shuffle(opts)) html += '<button class="btn opt" data-a="'+esc(o)+'">'+esc(o)+'</button>';
  html += '</div>';
  $('scr-warmup').innerHTML = html;

  const answer = c.type==='fact' ? c.f.answer : c.b.answer;
  let solved = false;
  document.querySelectorAll('#scr-warmup .opt').forEach(btn=>{
    btn.onclick = ()=>{
      if (solved) return;
      if (btn.getAttribute('data-a') === answer){
        solved = true;
        btn.classList.add('right');
        document.querySelectorAll('#scr-warmup .opt').forEach(b=>{ if(b!==btn) b.classList.add('dim'); });
        say(c.type==='ballpark' ? pick(C.enc.ballparkRight) : pick(C.enc.success), 'happy');
        if (c.type==='fact') srsMark(c.f.id, true);
        setTimeout(nextWarmupCard, 850);
      } else {
        btn.classList.add('wiggle');
        setTimeout(()=>btn.classList.remove('wiggle'), 400);
        say(c.type==='ballpark' && c.b.nudge ? c.b.nudge : pick(C.enc.tryAgain));
        if (c.type==='fact') srsMark(c.f.id, false);
      }
    };
  });
}
function srsMark(id, correct){
  const st = S.srs[id] || {box:0, due:todayStr()};
  st.box = correct ? Math.min(st.box+1, SRS_INTERVALS.length-1) : 0;
  const d = new Date(Date.now() + SRS_INTERVALS[st.box]*864e5);
  st.due = todayStr(d);
  S.srs[id] = st; save();
}
function nextWarmupCard(){
  WU.i++;
  if (WU.i < WU.cards.length) return renderWarmupCard();
  S.stats.warmups++;
  if (!S.doneToday.warmup){ S.doneToday.warmup = true; addXp(5); }
  save();
  if (sessionMode) startQuest(); else renderHome();
}

/* ---------------- quest (percent problems) ---------------- */
let Q = null;
function pickFrom(list, usedKey){
  let avail = list.filter(x=>!S[usedKey].includes(x.id));
  if (!avail.length){ S[usedKey] = []; save(); avail = list; }

/* ---------------- decimal elevator ---------------- */
// Value is (digit string, decimal places) — sliding is exact, no float math ever.
let EV = null;
function evParse(s){
  const i = s.indexOf('.');
  return i < 0 ? { d: s, dp: 0 } : { d: s.replace('.',''), dp: s.length - i - 1 };
}
function evDisplay(v){
  let d = v.d.replace(/^0+/, '') || '0', dp = v.dp;
  if (dp === 0) return d;
  while (d.length <= dp) d = '0' + d;          // pad so the point has a digit before it
  let out = d.slice(0, d.length - dp) + '.' + d.slice(d.length - dp);
  out = out.replace(/\.?0+$/, '');             // canonical: 9.0 → 9, 0.50 → 0.5
  return out;
}
function evTimes10(v){ return v.dp > 0 ? { d: v.d, dp: v.dp - 1 } : { d: v.d + '0', dp: 0 }; }
function evDiv10(v){ return { d: v.d, dp: v.dp + 1 }; }

function startElevator(){
  EV = { i: 0, v: null };
  say(C.elevator.intro);
  renderElevator(true);
  show('scr-elevator');
}
function renderElevator(fresh){
  const ch = C.elevator.challenges[EV.i];
  if (fresh) EV.v = evParse(ch.start);
  let html = '<div class="card"><p class="muted">Decimal Elevator · '+(EV.i+1)+' of '+C.elevator.challenges.length+'</p>';
  html += '<h2>'+esc(ch.prompt)+'</h2>';
  html += '<div class="bignum pop" id="evNum">'+esc(evDisplay(EV.v))+'</div>';
  html += '<div class="elevbtns"><button class="btn soft" id="evDown">÷10 ⬇️</button><button class="btn soft" id="evUp">×10 ⬆️</button></div>';
  html += '<p class="muted center">Target: <b>'+esc(ch.target)+'</b> — the digits never change, only their seats.</p>';
  html += '</div>';
  $('scr-elevator').innerHTML = html;
  $('evUp').onclick = ()=>evMove(evTimes10);
  $('evDown').onclick = ()=>evMove(evDiv10);
}
function evMove(fn){
  const ch = C.elevator.challenges[EV.i];
  const next = fn(EV.v);
  if (next.d.length > 8 || next.dp > 5){
    $('evNum').classList.add('wiggle');
    setTimeout(()=>$('evNum').classList.remove('wiggle'), 400);
    say('Whoa, too far that way — ride back!');
    return;
  }
  EV.v = next;
  const el = $('evNum');
  el.textContent = evDisplay(EV.v);
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  if (evDisplay(EV.v) === ch.target){
    say(ch.say, 'happy');
    setTimeout(()=>{
      EV.i++;
      if (EV.i < C.elevator.challenges.length) return renderElevator(true);
      S.stats.elevators++;
      if (!S.doneToday.elevator){ S.doneToday.elevator = true; addXp(5); }
      save();
      confetti();
      $('scr-elevator').innerHTML = '<div class="card center"><h2>Elevator mastered! 🛗</h2>'+
        '<p>×10, ÷10, 10%, 1%, percent→decimal — all one ride now.</p>'+
        '<button class="btn" id="evHome">Home</button></div>';
      $('evHome').onclick = renderHome;
    }, 1200);
  }
}

      '<div class="costume-row">fraction <b id="cFrac">0</b></div>'+
      '<div class="costume-row">decimal <b id="cDec">0</b></div>'+
      '<div class="costume-row">percent <b id="cPct">0%</b></div>'+
      '<div class="costume-row">out of 20 <b id="cOut">0 of 20</b></div>'+
      '</div></div>';
    html += '<input type="range" id="dial" min="0" max="100" step="0.1" value="0" style="width:100%;margin:14px 0;height:34px">';
    html += '<p class="muted center">Drag — all four costumes change together.</p>';
  } else {
    for (const o of ch.options) html += '<button class="btn opt" data-a="'+esc(o)+'">'+esc(o)+'</button>';
  }
  html += '</div>';
  $('scr-closet').innerHTML = html;

  if (ch.type === 'dial'){
    const dial = $('dial');
    const update = p => {
      const c = closetCostumes(p);
      $('pieArc').setAttribute('stroke-dasharray', (p/100*157.08)+' 157.08');
      $('cFrac').textContent = c.frac; $('cDec').textContent = c.dec;
      $('cPct').textContent = c.pct; $('cOut').textContent = c.out;
    };
    dial.oninput = () => update(Number(dial.value));
    dial.onchange = () => {
      const p = Number(dial.value);
      if (Math.abs(p - ch.target) <= 1.8){
        dial.value = ch.target; update(ch.target);
        dial.disabled = true;
        say(ch.say, 'happy');
        // Let the four-costumes-agreeing moment sink in: no auto-advance —
        // she moves on when she's ready.
        document.querySelectorAll('.costume-row').forEach((r,i)=>{
          setTimeout(()=>{ r.style.animation = 'pop .4s'; }, i*180);
        });
        const next = document.createElement('button');
        next.className = 'btn good';
        next.textContent = 'Got it — next ✨';
        next.onclick = nextCloset;
        document.querySelector('#scr-closet .card').appendChild(next);
      } else {
        say(p < ch.target ? 'Warmer going up! Keep dialing.' : 'A bit too far — ease it back down.');
      }
    };
    update(0);
  } else {
    let solved = false;
    document.querySelectorAll('#scr-closet .opt').forEach(btn=>{
      btn.onclick = ()=>{
        if (solved) return;
        if (btn.getAttribute('data-a') === ch.answer){
          solved = true; btn.classList.add('right');
          document.querySelectorAll('#scr-closet .opt').forEach(x=>{ if(x!==btn) x.classList.add('dim'); });
          say(ch.say, 'happy');
          setTimeout(nextCloset, 1500);
        } else {
          btn.classList.add('wiggle'); setTimeout(()=>btn.classList.remove('wiggle'),400);
          say(pick(C.enc.tryAgain));
        }
      };
    });
  }
}
function nextCloset(){
  CL.i++;
  if (CL.i < C.closet.challenges.length) return renderCloset();
  S.stats.closets = (S.stats.closets || 0) + 1;
  if (!S.doneToday.closet){ S.doneToday.closet = true; addXp(5); }
  save();
  confetti();
  $('scr-closet').innerHTML = '<div class="card center"><h2>Closet cleared! 🎭</h2>'+
    '<p>Fraction, decimal, percent, “out of”, chance — one number, five outfits, zero mystery.</p>'+
    '<button class="btn" id="clHome">Home</button></div>';
  $('clHome').onclick = renderHome;
}

/* ---------------- progress & sharing ---------------- */
function progressSnapshot(){
  const strong = [], working = [], tricky = [];
  for (const f of C.facts.facts){
    const st = S.srs[f.id];
    if (!st) continue;
    (st.box >= 3 ? strong : st.box >= 1 ? working : tricky).push(f.front);
  }
  const unseen = C.facts.facts.length - strong.length - working.length - tricky.length;
  return { strong, working, tricky, unseen,
    tricks: Object.keys(S.tricksTried || {}).length,
    coupons: S.coupons.length };
}
function progressText(){
  const p = progressSnapshot();
  const shorten = a => a.slice(0,3).map(t=>'“'+t.replace(/…$/,'')+'”').join(', ');
  let t = 'MathPie progress 🥧\n';
  t += '🔥 Streak: '+S.streak+' days · ⭐ '+S.xp+' XP\n';
  t += '✅ Quests: '+S.stats.quests+' · 🏋️ Gym solves: '+S.stats.gyms+' · ☀️ Warm-ups: '+S.stats.warmups+' · 🛗 Elevator runs: '+S.stats.elevators+'\n';
  t += '💪 Strong facts: '+p.strong.length+(p.strong.length?' (e.g. '+shorten(p.strong)+')':'')+'\n';
  if (p.tricky.length) t += '🌱 Still cooking: '+shorten(p.tricky)+'\n';
  t += '🪄 Tricks learned: '+p.tricks+' · 🎟️ Coupons earned: '+p.coupons;
  return t;
}
async function shareProgress(){
  const text = progressText();
  if (navigator.share){
    try { await navigator.share({ text }); S.lastShareNudge = todayStr(); save(); return; }
    catch(e){ /* user cancelled — fall through quietly */ return; }
  }
  location.href = 'mailto:?subject=' + encodeURIComponent('MathPie progress') +
    '&body=' + encodeURIComponent(text);
  S.lastShareNudge = todayStr(); save();
}
function renderProgress(){
  const p = progressSnapshot();
  let html = '<div class="card center"><h2>📈 My Progress</h2>';
  html += '<p style="font-size:34px;margin:6px">🔥 '+S.streak+' &nbsp; ⭐ '+S.xp+'</p>';
  html += '<p class="muted">'+S.stats.quests+' quests · '+S.stats.gyms+' gym solves · '+S.stats.warmups+' warm-ups · '+S.stats.elevators+' elevator runs</p>';
  html += '<button class="btn" id="shareBtn">📤 Send to Dad</button></div>';
  const section = (title, items, empty) => {
    let h = '<div class="card"><h2>'+title+'</h2>';
    h += items.length ? items.map(t=>'<div class="coupon-row"><span>'+esc(t)+'</span></div>').join('')
                      : '<p class="muted">'+empty+'</p>';
    return h + '</div>';
  };
  html += section('💪 Strong ('+p.strong.length+')', p.strong, 'Nothing locked in yet — the streak takes care of this.');
  html += section('🌱 Still cooking ('+p.tricky.length+')', p.tricky, 'Nothing stuck in the tricky pile. Nice.');
  html += '<div class="card"><p class="muted">🔁 In progress: '+p.working.length+' facts · 🆕 Not yet seen: '+p.unseen+' · 🪄 Tricks: '+p.tricks+'/'+C.tricks.length+'</p></div>';
  html += '<button class="btn soft" id="progressHome">Home</button>';
  $('scr-progress').innerHTML = html;
  show('scr-progress');
  $('shareBtn').onclick = shareProgress;
  $('progressHome').onclick = renderHome;
  say('Look at all that. Slow and steady — my favorite speed.', 'happy');
}

/* ---------------- tutor (optional streaming proxy) ---------------- */
async function askTutor(ctx){
  const url = S.settings.tutorUrl.replace(/\/+$/,'');
  say('Hmm, let me think… 🤔');
  try{
    const res = await fetch(url + '/tutor', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(ctx)
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '', text = '';
    while (true){
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines){
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6);
        if (d === '[DONE]') continue;
        try { text += JSON.parse(d); } catch(err) { text += d; }
        $('bubble').innerHTML = '<b>'+esc(C.enc.mascotName)+':</b> '+esc(text);
      }
    }
    if (!text) say('The tutor line is quiet right now — but my regular hints still work!');
  } catch(e){
    say('Can\'t reach my tutor brain right now — no worries, the hints still work!');
  }
}

/* ---------------- settings ---------------- */
function renderCouponEditor(){
  const pool = S.couponPool || [];
  $('couponEditor').innerHTML = pool.map((label,i)=>
    '<div class="coupon-row"><span>'+esc(label)+'</span>'+
    '<button class="btn small soft" data-delcoupon="'+i+'">✕</button></div>'
  ).join('') || '<p class="muted">No coupons — add some below!</p>';
  document.querySelectorAll('[data-delcoupon]').forEach(b=>{
    b.onclick = ()=>{ S.couponPool.splice(Number(b.getAttribute('data-delcoupon')),1); save(); renderCouponEditor(); };
  });
}
function wireSettings(){
  $('gearBtn').onclick = ()=>{
    $('tutorUrlInput').value = S.settings.tutorUrl;
    $('tutorTestResult').textContent='';
    renderCouponEditor();
    $('settingsModal').classList.add('open');
  };
  $('addCouponBtn').onclick = ()=>{
    const v = $('newCouponInput').value.trim();
    if (!v) return;
    S.couponPool = S.couponPool || [];
    S.couponPool.push(v); save();
    $('newCouponInput').value = '';
    renderCouponEditor();
  };
  $('closeSettingsBtn').onclick = ()=> $('settingsModal').classList.remove('open');
  $('saveSettingsBtn').onclick = ()=>{
    S.settings.tutorUrl = $('tutorUrlInput').value.trim(); save();
    $('settingsModal').classList.remove('open');
  };
  $('testTutorBtn').onclick = async ()=>{
    const u = $('tutorUrlInput').value.trim().replace(/\/+$/,'');
    $('tutorTestResult').textContent = ' …';
    try{ const r = await fetch(u+'/health'); $('tutorTestResult').textContent = r.ok ? ' Connected ✓' : ' Error '+r.status; }
    catch(e){ $('tutorTestResult').textContent = ' Could not connect ✗'; }
  };
  $('resetBtn').onclick = ()=>{
    if (confirm('Erase ALL progress, streak, and coupons?') && confirm('Really? This cannot be undone.')){
      localStorage.removeItem(KEY); location.reload();
    }
  };
}

/* ---------------- boot ---------------- */
async function boot(){
  try{
    const files = ['skills','facts','problems','equations','encouragement','rewards','elevator','tricks','closet'];
    const data = await Promise.all(files.map(f=>fetch('./content/'+f+'.json').then(r=>{
      if(!r.ok) throw new Error(f); return r.json();
    })));
    C = { skills:data[0], facts:data[1], problems:data[2], equations:data[3], enc:data[4], rewards:data[5], elevator:data[6], tricks:data[7], closet:data[8] };
  } catch(e){
    document.getElementById('app').innerHTML = '<div class="card"><h2>Hmm, couldn\'t load.</h2>'+
      '<p>MathPie needs to be served over http(s) — opening the file directly won\'t work. '+
      'Try <code>node tools/serve.js</code> in the app folder, or use the web link.</p></div>';
    return;
  }
  if (!S.couponPool){ S.couponPool = C.rewards.coupons.map(c=>c.label); save(); }
  renderHeader(); renderHat(); wireSettings(); renderHome();
  if ('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}
boot();
</script>
