# Fly.io config for the MathPie tutor proxy.
# Deploy from this directory: fly launch --copy-config --no-deploy, then
# fly secrets set ANTHROPIC_API_KEY=..., then fly deploy. Scale-to-zero: costs
# nothing while idle; cold start is a few seconds on the first tutor call.

app = "mathpie-tutor"
primary_region = "sjc"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
